[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--basetemp=.pytest_tmp"

[tool.black]
line-length = 88
target-version = ["py314"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.git
  | \.mypy_cache
  | \.pytest_cache
  | \.venv
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.14"
files = ["src", "tests"]
ignore_missing_imports = true
warn_unused_configs = true
no_implicit_optional = true
check_untyped_defs = true